<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" type="text/css" href="splash.css" />
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, width=device-width, height=device-height, user-scalable=0"
    />
    <title>Temple of Ash</title>
  </head>
  <body class="app fade-in">
    <div class="fire-particles">
      <div class="particle" style="left: 10%; animation-delay: 0s;"></div>
      <div class="particle" style="left: 20%; animation-delay: 0.5s;"></div>
      <div class="particle" style="left: 30%; animation-delay: 1s;"></div>
      <div class="particle" style="left: 40%; animation-delay: 1.5s;"></div>
      <div class="particle" style="left: 50%; animation-delay: 2s;"></div>
      <div class="particle" style="left: 60%; animation-delay: 0.2s;"></div>
      <div class="particle" style="left: 70%; animation-delay: 0.7s;"></div>
      <div class="particle" style="left: 80%; animation-delay: 1.2s;"></div>
      <div class="particle" style="left: 90%; animation-delay: 1.7s;"></div>
    </div>
    <div class="glow-container">
      <div class="glow-circle"></div>
    </div>
    <div class="content">
      <div class="title-container">
        <h1 class="title">TEMPLE</h1>
        <h1 class="title">OF</h1>
        <h1 class="title font-glow">ASH</h1>
      </div>
      <p class="subtitle">Restore the Ancient Flame</p>
    </div>
    <div class="action-container">
      <button class="start-button" id="start-button">ENTER DUNGEON</button>
    </div>
    <footer class="footer">
      <div>Temple of Ash © 2026</div>
    </footer>
    <script type="module" src="splash.ts" defer></script>
  </body>
</html>
